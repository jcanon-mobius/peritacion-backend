openapi: 3.0.3
info:
  title: Pre-signed Upload URL API
  version: 1.0.0
paths:
  /uploads/presign:
    post:
      summary: Generate a pre-signed URL for uploading a file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - filename
              properties:
                filename:
                  type: string
                  example: video.mp4
      responses:
        '200':
          description: URL successfully generated
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                properties:
                  url:
                    type: string
                    format: uri
                    example: https://s3-pre-signed-url-example.com/video.mp4